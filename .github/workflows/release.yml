name: Release BoatOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-helm:
    name: Build Helm (flutter-pi arm64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install arm64 cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.2'
          channel: 'stable'
          cache: true

      - name: Install flutterpi_tool
        run: dart pub global activate flutterpi_tool

      - name: Build flutter-pi bundle (arm64, generic)
        working-directory: flutter_app
        run: |
          flutter pub get
          $HOME/.pub-cache/bin/flutterpi_tool build --arch=arm64 --cpu=generic --release

      - name: Extract version tag
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: BoatOS ${{ steps.tag.outputs.TAG }}
          body: |
            ## BoatOS ${{ steps.tag.outputs.TAG }}

            ### Automatisches Update
            In BoatOS → Einstellungen → System → **Jetzt aktualisieren** tippen.
            Der Pi lädt alle Änderungen und startet neu.

            ### Manuelles Update
            ```bash
            bash /home/boatos/BoatOS/scripts/update.sh
            ```

            ### Enthaltene Dateien
            - `app.so` — Helm-App (Flutter, arm64 generic)
          files: flutter_app/build/flutter-pi/aarch64-generic/app.so
          draft: false
          prerelease: false
          make_latest: true
