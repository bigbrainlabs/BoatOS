# BoatOS — NetworkManager soll /etc/resolv.conf NICHT verwalten.
#
# Grund: Internet/DNS laufen über eth0 (dhcpcd, feste .222). NetworkManager
# verwaltet nur wlan0. Mit dem Default (dns=default) schreibt NM die GLOBALE
# resolv.conf aus seinen eigenen Verbindungen — ist wlan0 getrennt, schreibt
# NM sie LEER und überschreibt dhcpcds eth0-Nameserver → DNS tot, alle
# Online-Dienste offline (die "DNS-Falle" nach Boot/Update-Reboot).
#
# Mit dns=none fasst NM resolv.conf gar nicht mehr an; dhcpcd (eth0) ist der
# alleinige Schreiber. Betrifft nur DNS, nicht das Interface-Management —
# der eth0(dhcpcd)/wlan0(NM)-Split bleibt unverändert.
[main]
dns=none
