name: boatos_ui
description: "BoatOS V2 — Native touchscreen UI for Raspberry Pi (flutter-pi)"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Map
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  vector_map_tiles: 9.0.0-beta.8
  vector_tile_renderer: any

  # HTTP + WebSocket
  http: ^1.4.0
  web_socket_channel: ^3.0.2

  # State management
  provider: ^6.1.2

  # Utils
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: NotoColorEmoji
      fonts:
        - asset: assets/fonts/NotoColorEmoji.ttf
